    <script>
      // GitHub Pages SPA redirect handler
      // Reads the path encoded by 404.html and restores the correct URL for React Router
      (function(l) {
        if (l.search && l.search.length > 1) {
          var qs = l.search.slice(1); // strip leading '?'
          // The 404.html encodes path as: wsp~q~originalQuery or just wsp
          var parts = qs.split('~q~');
          var path = '/' + parts[0].replace(/~and~/g, '&');
          var query = parts[1] ? '?' + parts[1].replace(/~and~/g, '&') : '';
          // Only redirect if it looks like a real path (not a cache-busting param)
          if (path.length > 1 && !path.startsWith('/nocache') && !path.startsWith('/v=')) {
            window.history.replaceState(
              null, null,
              l.pathname.replace(/\/$/, '') + path + query + l.hash
            );
          }
        }
      }(window.location));
    </script>
